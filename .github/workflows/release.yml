name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: make build

      - name: Run unit tests
        run: make test

      - name: Package
        id: package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          zip_name="QLOmni-${version}.zip"
          # ditto preserves bundle metadata + xattrs in a way `zip` does not.
          ditto -c -k --sequesterRsrc --keepParent \
            build/Build/Products/Release/QLOmni.app \
            "${zip_name}"
          sha256="$(shasum -a 256 "${zip_name}" | awk '{print $1}')"
          {
            echo "zip_name=${zip_name}"
            echo "sha256=${sha256}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.package.outputs.zip_name }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "QLOmni ${{ steps.package.outputs.version }} — ad-hoc signed (not notarized).

          On first launch, macOS Gatekeeper will block the app. Either:
          - Right-click → Open the first time, or
          - Run \`xattr -dr com.apple.quarantine /Applications/QLOmni.app\`

          SHA-256: \`${{ steps.package.outputs.sha256 }}\`"
